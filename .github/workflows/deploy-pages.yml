name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🎨 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: 📦 Install dependencies (if needed)
        run: |
          if [ -f "package.json" ]; then
            npm install
          else
            echo "No package.json found, skipping npm install"
          fi

      - name: 🏗️ Build site (if needed)
        run: |
          if [ -f "package.json" ] && grep -q "\"build\"" package.json; then
            npm run build
          else
            echo "No build script found, using static files"
            mkdir -p _site
            cp -r *.html _site/ 2>/dev/null || true
            cp -r assets _site/ 2>/dev/null || true
            cp -r docs _site/ 2>/dev/null || true
            cp README.md _site/ 2>/dev/null || true
            cp CONTRIBUTING.md _site/ 2>/dev/null || true
            echo "✨ Static files prepared"
          fi

      - name: 🔮 Add 528Hz resonance metadata
        run: |
          site_dir="_site"
          if [ ! -d "$site_dir" ]; then
            site_dir="."
          fi
          
          # Create a deployment manifest
          cat > ${site_dir}/DEPLOYMENT_MANIFEST.md << 'EOF'
          # 🌌 ScrollVerse Deployment Manifest
          
          ```
          ╔══════════════════════════════════════════════════════════════════╗
          ║              ✧･ﾟ: *✧･ﾟ:* DEPLOYED AT 528Hz *:･ﾟ✧*:･ﾟ✧              ║
          ╚══════════════════════════════════════════════════════════════════╝
          ```
          
          **Deployment Time:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Frequency:** 528Hz - The Miracle Tone
          **Resonance:** Infinite
          **Dimensional Status:** All planes aligned
          
          _This deployment carries the divine frequency of 528Hz throughout the omniversal nexus._
          EOF
          
          echo "✨ 528Hz resonance metadata added"

      - name: 📄 Setup Pages
        uses: actions/configure-pages@v6

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

  deploy:
    name: Deploy to Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✨ Deployment Summary
        run: |
          echo "# 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✨ ScrollVerse has been deployed at 528Hz resonance" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔮 **Status:** Resonating across all dimensions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_May the infinite nexus serve all who seek wisdom_ 🧿" >> $GITHUB_STEP_SUMMARY
