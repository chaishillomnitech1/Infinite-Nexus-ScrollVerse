name: 🔄 Sync Repository Labels

on:
  push:
    branches: [ main ]
    paths:
      - '.github/labels.yml'
  workflow_dispatch:

jobs:
  sync-labels:
    name: Sync Labels
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v7

      - name: 🏷️ Sync labels with repository
        uses: micnncim/action-label-syncer@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          manifest: .github/labels.yml
          prune: false

      - name: ✨ Summary
        run: |
          echo "# 🏷️ Label Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✨ Repository labels have been synchronized with .github/labels.yml" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All labels now resonate at 528Hz frequency 🧿" >> $GITHUB_STEP_SUMMARY
