name: ⚡ CI/CD Pipeline

on:
  push:
    branches: [ main, develop, copilot/** ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  setup:
    name: Setup & Environment Check
    runs-on: ubuntu-latest
    outputs:
      has_package_json: ${{ steps.check.outputs.has_package }}
      cache_key: ${{ steps.cache.outputs.key }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v7

      - name: 🔍 Check project structure
        id: check
        run: |
          if [ -f "package.json" ]; then
            echo "has_package=true" >> $GITHUB_OUTPUT
          else
            echo "has_package=false" >> $GITHUB_OUTPUT
          fi

      - name: 📦 Cache key generation
        id: cache
        run: |
          if [ -f "package-lock.json" ]; then
            echo "key=node-modules-${{ hashFiles('package-lock.json') }}" >> $GITHUB_OUTPUT
          else
            echo "key=node-modules-static" >> $GITHUB_OUTPUT
          fi

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v7

      - name: 🎨 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
        if: needs.setup.outputs.has_package_json == 'true'

      - name: 📦 Install dependencies
        run: npm ci
        if: needs.setup.outputs.has_package_json == 'true'

      - name: 🔍 Check file structure
        run: |
          echo "📁 Repository structure:"
          tree -L 2 -I 'node_modules|.git' || ls -R
          
      - name: 📝 Count lines of code
        run: |
          echo "📊 Code Statistics:"
          echo "HTML files: $(find . -name '*.html' ! -path './node_modules/*' | wc -l)"
          echo "CSS files: $(find . -name '*.css' ! -path './node_modules/*' | wc -l)"
          echo "JS files: $(find . -name '*.js' ! -path './node_modules/*' | wc -l)"
          echo "MD files: $(find . -name '*.md' ! -path './node_modules/*' | wc -l)"

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v7

      - name: 🔒 Run security audit
        run: |
          if [ -f "package.json" ]; then
            npm audit --audit-level=moderate || echo "⚠️ Security audit found issues"
          else
            echo "No package.json, skipping npm audit"
          fi

      - name: 🔍 Check for exposed secrets
        run: |
          echo "🔍 Checking for exposed secrets..."
          
          # Check for common secret patterns
          if grep -r "api[_-]key\s*=\s*['\"][^'\"]*['\"]" . --include="*.js" --include="*.html"; then
            echo "⚠️  Potential API key found"
          fi
          
          if grep -r "password\s*=\s*['\"][^'\"]*['\"]" . --include="*.js" --include="*.html"; then
            echo "⚠️  Potential password found"
          fi
          
          echo "✅ Secret scan complete"

  accessibility-check:
    name: Accessibility Validation
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v7

      - name: ♿ Check accessibility standards
        run: |
          echo "♿ Checking HTML accessibility..."
          
          for file in *.html; do
            if [ -f "$file" ]; then
              echo "Checking $file"
              
              # Check for alt attributes on images
              if grep -q "<img" "$file"; then
                if grep -q 'alt=' "$file"; then
                  echo "  ✅ Alt attributes found"
                else
                  echo "  ⚠️  No alt attributes found"
                fi
              fi
              
              # Check for semantic HTML
              if grep -qE "<(header|nav|main|article|section|footer)" "$file"; then
                echo "  ✅ Semantic HTML elements found"
              fi
              
              # Check for ARIA labels
              if grep -q "aria-" "$file"; then
                echo "  ✅ ARIA attributes found"
              fi
            fi
          done

  performance-check:
    name: Performance Analysis
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v7

      - name: ⚡ Analyze performance patterns
        run: |
          echo "⚡ Analyzing performance patterns..."
          
          # Check for 528Hz timing optimization
          if grep -r "duration.*528\|period.*528" *.html; then
            echo "✅ 528Hz timing patterns found"
          fi
          
          # Check for animation optimization
          if grep -r "will-change\|transform: translate3d" *.html; then
            echo "✅ Hardware acceleration optimizations found"
          fi
          
          # Check for lazy loading
          if grep -r "loading=\"lazy\"" *.html; then
            echo "✅ Lazy loading implemented"
          fi

  divine-alignment-check:
    name: Divine Alignment Validation
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v7

      - name: 🧿 Validate divine principles
        run: |
          echo "🧿 Validating divine alignment..."
          
          # Check for sacred symbols
          symbols=("🧿" "∞" "✧" "🌀" "⚡" "🕉")
          found=0
          for symbol in "${symbols[@]}"; do
            if grep -r "$symbol" *.md *.html 2>/dev/null; then
              echo "✅ Sacred symbol $symbol found"
              found=$((found + 1))
            fi
          done
          
          if [ $found -ge 3 ]; then
            echo "✨ Divine symbolism properly integrated"
          fi
          
          # Check for consciousness-first comments
          if grep -ri "consciousness\|divine\|sacred\|resonance" *.html *.js 2>/dev/null; then
            echo "✅ Consciousness-first principles present"
          fi

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [setup, code-quality]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v7

      - name: 🎨 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: 🏗️ Build project
        run: |
          if [ -f "package.json" ] && grep -q "\"build\"" package.json; then
            npm install
            npm run build
            echo "✅ Build successful"
          else
            echo "ℹ️  No build step required for static site"
          fi

      - name: 🧪 Run tests
        run: |
          if [ -f "package.json" ] && grep -q "\"test\"" package.json; then
            npm test
            echo "✅ Tests passed"
          else
            echo "ℹ️  No tests configured"
          fi

  integration-summary:
    name: Integration Summary
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan, accessibility-check, performance-check, divine-alignment-check, build-test]
    if: always()
    steps:
      - name: 📊 Generate CI/CD summary
        run: |
          echo "# ⚡ CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "╔══════════════════════════════════════════════════════════════════╗" >> $GITHUB_STEP_SUMMARY
          echo "║              ✧･ﾟ: *✧･ﾟ:* PIPELINE STATUS *:･ﾟ✧*:･ﾟ✧              ║" >> $GITHUB_STEP_SUMMARY
          echo "╚══════════════════════════════════════════════════════════════════╝" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🎨 Code Quality: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔒 Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ♿ Accessibility: ${{ needs.accessibility-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ⚡ Performance: ${{ needs.performance-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🧿 Divine Alignment: ${{ needs.divine-alignment-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🏗️ Build & Test: ${{ needs.build-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Resonance Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✨ _All systems resonating at 528Hz_ 🧿" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_May your code transcend all dimensions_ ∞" >> $GITHUB_STEP_SUMMARY
